<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz Anatomia e Fisiologia - 50 domande</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --ok: #0f766e;
      --bad: #b91c1c;
      --soft-ok: #d1fae5;
      --soft-bad: #fee2e2;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #1e3a8a, #0f766e);
      color: white;
      padding: 28px 18px;
      text-align: center;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
    }
    header p { margin: 0; opacity: .95; }
    main {
      max-width: 980px;
      margin: 24px auto 80px;
      padding: 0 16px;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 247, 251, .94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      margin-bottom: 18px;
    }
    .toolbar-inner {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .score {
      font-weight: 700;
      padding: 8px 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: var(--accent);
      color: white;
    }
    button.secondary {
      background: #374151;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.045);
    }
    .q-title {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .q-num {
      min-width: 42px;
      height: 32px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #1e3a8a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }
    .q-text {
      font-size: 1.05rem;
      font-weight: 750;
    }
    .options {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    label.option {
      display: block;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: #fff;
      transition: transform .05s ease, border-color .1s ease, background .1s ease;
    }
    label.option:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }
    label.option input {
      margin-right: 9px;
      transform: translateY(1px);
    }
    .option.correct {
      background: var(--soft-ok);
      border-color: var(--ok);
    }
    .option.wrong {
      background: var(--soft-bad);
      border-color: var(--bad);
    }
    .feedback {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f9fafb;
    }
    .feedback.ok {
      display: block;
      border-color: var(--ok);
      background: var(--soft-ok);
    }
    .feedback.bad {
      display: block;
      border-color: var(--bad);
      background: var(--soft-bad);
    }
    .feedback strong {
      display: block;
      margin-bottom: 4px;
    }
    .question-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    footer {
      color: var(--muted);
      text-align: center;
      font-size: .9rem;
      margin: 28px 0;
    }
    .final-box {
      display: none;
      background: white;
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 18px;
      margin: 20px 0;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .final-box.show { display: block; }
    @media print {
      .toolbar, .question-actions, button { display: none !important; }
      body { background: white; }
      .question-card { box-shadow: none; page-break-inside: avoid; }
      .feedback { display: block; }
    }
  </style>
</head>
<body>
<header>
  <h1>Quiz di Anatomia e Fisiologia</h1>
  <p>50 domande a risposta multipla su fegato, vie biliari, intestino e pancreas</p>
</header>

<main>
  <div class="toolbar">
    <div class="toolbar-inner">

  <div class="final-box" id="finalBox"></div>
  <div id="quiz"></div>

  <footer>
    Ogni risposta mostra subito la spiegazione. Puoi anche correggere tutto alla fine.
  </footer>
</main>

let answered = new Map();

function letter(i) {
  return String.fromCharCode(65 + i);
}

function renderQuiz() {
  const container = document.getElementById("quiz");
  container.innerHTML = "";
  questions.forEach((item, idx) => {
    const card = document.createElement("section");
    card.className = "question-card";
    card.id = "q" + idx;

    const title = document.createElement("div");
    title.className = "q-title";
    title.innerHTML = `<span class="q-num">${idx + 1}</span><span class="q-text">${escapeHtml(item.q)}</span>`;
    card.appendChild(title);

    const opts = document.createElement("div");
    opts.className = "options";

    item.options.forEach((opt, optIdx) => {
      const label = document.createElement("label");
      label.className = "option";
      label.id = `q${idx}_opt${optIdx}`;
      label.innerHTML = `
        <input type="radio" name="q${idx}" value="${optIdx}" onchange="answerQuestion(${idx}, ${optIdx})">
        <strong>${letter(optIdx)})</strong> ${escapeHtml(opt)}
      `;
      opts.appendChild(label);
    });

    card.appendChild(opts);

    const feedback = document.createElement("div");
    feedback.className = "feedback";
    feedback.id = "feedback" + idx;
    card.appendChild(feedback);

    const actions = document.createElement("div");
    actions.className = "question-actions";
    actions.innerHTML = `<button type="button" onclick="showSolution(${idx})">Mostra soluzione</button>`;
    card.appendChild(actions);

    container.appendChild(card);
  });
  updateScore();
}

function answerQuestion(qIdx, optIdx) {
  const item = questions[qIdx];
  const isCorrect = optIdx === item.answer;
  answered.set(qIdx, { selected: optIdx, correct: isCorrect });
  applyFeedback(qIdx, optIdx, false);
  updateScore();
}

function applyFeedback(qIdx, selectedIdx, forced) {
  const item = questions[qIdx];

  item.options.forEach((_, i) => {
    const label = document.getElementById(`q${qIdx}_opt${i}`);
    label.classList.remove("correct", "wrong");
  });

  const correctLabel = document.getElementById(`q${qIdx}_opt${item.answer}`);
  correctLabel.classList.add("correct");

  if (selectedIdx !== item.answer && selectedIdx !== null) {
    const wrongLabel = document.getElementById(`q${qIdx}_opt${selectedIdx}`);
    wrongLabel.classList.add("wrong");
  }

  const fb = document.getElementById("feedback" + qIdx);
  if (selectedIdx === item.answer) {
    fb.className = "feedback ok";
    fb.innerHTML = `<strong>Giusto.</strong> ${escapeHtml(item.explain)}`;
  } else if (selectedIdx === null) {
    fb.className = "feedback ok";
    fb.innerHTML = `<strong>Soluzione: ${letter(item.answer)}) ${escapeHtml(item.options[item.answer])}</strong> ${escapeHtml(item.explain)}`;
  } else {
    fb.className = "feedback bad";
    fb.innerHTML = `<strong>Non è corretto. La risposta giusta è ${letter(item.answer)}) ${escapeHtml(item.options[item.answer])}.</strong> ${escapeHtml(item.explain)}`;
  }

  if (forced && !answered.has(qIdx)) {
    answered.set(qIdx, { selected: null, correct: false, shownOnly: true });
  }
}

function showSolution(qIdx) {
  const chosen = document.querySelector(`input[name="q${qIdx}"]:checked`);
  if (chosen) {
    answerQuestion(qIdx, Number(chosen.value));
  } else {
    applyFeedback(qIdx, null, true);
    updateScore();
  }
}

function checkAll() {
  questions.forEach((_, idx) => {
    const chosen = document.querySelector(`input[name="q${idx}"]:checked`);
    if (chosen) {
      answerQuestion(idx, Number(chosen.value));
    } else {
      applyFeedback(idx, null, true);
    }
  });
  updateScore();
  const final = document.getElementById("finalBox");
  const realAnswers = Array.from(answered.values()).filter(x => !x.shownOnly);
  const correct = realAnswers.filter(x => x.correct).length;
  const totalAnswered = realAnswers.length;
  final.className = "final-box show";
  final.textContent = `Risultato: ${correct}/${questions.length} corrette. Hai risposto a ${totalAnswered} domande su ${questions.length}.`;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetQuiz() {
  answered.clear();
  document.getElementById("finalBox").className = "final-box";
  document.getElementById("finalBox").textContent = "";
  renderQuiz();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateScore() {
  const realAnswers = Array.from(answered.values()).filter(x => !x.shownOnly);
  const total = realAnswers.length;
  const correct = realAnswers.filter(x => x.correct).length;
  const errors = total - correct;
  document.getElementById("score").textContent =
    `Risposte: ${total}/${questions.length} · Corrette: ${correct} · Errori: ${errors}`;
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

renderQuiz();
</script>
</body>
</html>
