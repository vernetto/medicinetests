function grpClass(g){ return 't-'+g; }

function makeCell(z, sym, name, grp){
  const d = document.createElement('div');
  d.className = 'el ' + grpClass(grp);
  d.dataset.z = z;
  d.innerHTML = `<span class="num">${z}</span><span class="sym">${sym}</span><span class="nam">${name}</span>`;
  d.onclick = () => showElement(z, sym, name, grp, d);
  return d;
}

function makePlaceholder(label, sublabel, grp, zStart, zEnd){
  const d = document.createElement('div');
  d.className = 'el ' + grpClass(grp);
  d.innerHTML = `<span class="sym" style="font-size:8px">${label}</span><span class="nam">${sublabel}</span>`;
  d.style.cursor = 'pointer';
  d.onclick = () => showGroup(grp);
  return d;
}

fullGrid.forEach(row => {

      blank.className = 'el blank';
      grid.appendChild(blank);

      grid.appendChild(makePlaceholder('57–71','Lantanidi','lan'));
    } else if(z === 'AC'){
      grid.appendChild(makePlaceholder('89–103','Attinidi','act'));
    } else {

      grid.appendChild(makeCell(z, el.sym, el.name, el.grp));

  });
});

function stateIcon(s){
  if(!s) return '';
  const m = {Gas:'<i class="ti ti-wind" aria-hidden="true"></i>',Solido:'<i class="ti ti-box" aria-hidden="true"></i>',Liquido:'<i class="ti ti-droplet" aria-hidden="true"></i>'};
  return m[s]||'';
}

function showElement(z, sym, name, grp, cellEl){
  if(selectedEl) selectedEl.classList.remove('selected');
  if(cellEl){ cellEl.classList.add('selected'); selectedEl = cellEl; }
  const g = groupInfo[grp] || {label:grp, bg:'#F1EFE8', color:'#2C2C2A', bc:'#888780', desc:''};
  const el = masterData[z] || {};
  const panel = document.getElementById('panel');
  const hasDetail = el.mass || el.config || el.uses || el.story;
  const tmelt = el.tmelt !== undefined ? el.tmelt+'°C' : '—';
  const tboil = el.tboil !== undefined ? el.tboil+'°C' : '—';
  panel.innerHTML = `
    <div class="panel-header">
      <div class="el-big" style="background:${g.bg};color:${g.color};border-color:${g.bc};">
        <span class="bz">${z}</span>
        <span class="bs">${sym}</span>
        <span class="bn">${el.mass||''}</span>
      </div>
      <div class="panel-title">
        <h3>${name}</h3>
        <div class="subtitle">${el.config||''}</div>
        <div style="margin-top:4px;">
          <span class="badge" style="background:${g.bg};color:${g.color};border:0.5px solid ${g.bc}">${g.label}</span>
          ${el.state ? `<span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)">${stateIcon(el.state)} ${el.state}</span>` : ''}
        </div>
      </div>
    </div>
    ${hasDetail ? `
    <div class="props">
      ${el.mass ? `<div class="prop"><div class="lbl">Massa atomica</div><div class="val">${el.mass} u</div></div>` : ''}
      ${el.tmelt !== undefined ? `<div class="prop"><div class="lbl">Fusione</div><div class="val">${tmelt}</div></div>` : ''}
      ${el.tboil !== undefined ? `<div class="prop"><div class="lbl">Ebollizione</div><div class="val">${tboil}</div></div>` : ''}
      ${el.uses ? `<div class="prop" style="grid-column:1/-1"><div class="lbl">Usi principali</div><div class="val" style="font-weight:400;font-size:12px;line-height:1.5">${el.uses}</div></div>` : ''}
    </div>
    <div class="story">${el.story||g.desc}</div>
    ` : `<div class="story">${g.desc}</div>`}
    <button class="ask-btn" onclick="sendPrompt('Dimmi di più sul ${name} (${sym}): proprietà chimiche, composti importanti e applicazioni')">Approfondisci ${sym} ↗</button>
  `;
}

function showGroup(grp){
  const g = groupInfo[grp] || {label:grp,bg:'#F1EFE8',color:'#2C2C2A',bc:'#888780',desc:''};

}
