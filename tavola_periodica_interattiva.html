
<style>
.pt-grid { display:grid; grid-template-columns: repeat(18,1fr); gap:3px; margin-bottom:16px; }
.el { border-radius:4px; cursor:pointer; padding:3px 2px; text-align:center; border:0.5px solid transparent; transition:transform .12s, box-shadow .12s; position:relative; }
.el:hover { transform:scale(1.12); z-index:10; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.el .num { font-size:8px; color:inherit; opacity:.7; display:block; }
.el .sym { font-size:13px; font-weight:500; display:block; line-height:1.1; }
.el .nam { font-size:7px; display:block; opacity:.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.info-card { border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary); padding:1rem 1.25rem; min-height:120px; background:var(--color-background-primary); }
.info-card h3 { margin:0 0 4px; font-size:16px; font-weight:500; }
.info-card p  { margin:4px 0 0; font-size:13px; color:var(--color-text-secondary); line-height:1.6; }
.legend { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.leg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--color-text-secondary); }
.leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
/* color palette per tipo */
.t-metal-alk   { background:#FAEEDA; color:#854F0B; border-color:#EF9F27; }
.t-metal-alk2  { background:#FAC775; color:#633806; border-color:#BA7517; }
.t-metal-trans { background:#B5D4F4; color:#0C447C; border-color:#378ADD; }
.t-metal-post  { background:#CED9F0; color:#1a2d6e; border-color:#8fa3d6; }
.t-metalloid   { background:#C0DD97; color:#27500A; border-color:#639922; }
.t-nonmetal    { background:#EEEDFE; color:#3C3489; border-color:#7F77DD; }
.t-halogen     { background:#F4C0D1; color:#72243E; border-color:#D4537E; }
.t-noble       { background:#F5C4B3; color:#711B13; border-color:#D85A30; }
.t-lan-act     { background:#D3D1C7; color:#2C2C2A; border-color:#888780; }
.t-blank       { background:transparent; border-color:transparent; cursor:default; }
.t-blank:hover { transform:none; box-shadow:none; }
</style>

<div class="legend">
  <div class="leg-item"><div class="leg-dot t-metal-alk"></div>Metalli alcalini</div>
  <div class="leg-item"><div class="leg-dot t-metal-alk2"></div>Alcalino-terrosi</div>
  <div class="leg-item"><div class="leg-dot t-metal-trans"></div>Metalli di transizione</div>
  <div class="leg-item"><div class="leg-dot t-metal-post"></div>Metalli post-trans.</div>
  <div class="leg-item"><div class="leg-dot t-metalloid"></div>Metalloidi</div>

</div>

  'metal-trans':{ label:'Metalli di transizione', color:'#0C447C', story:'Il grande condominio del centro: ferro Fe, rame Cu, oro Au, argento Ag, zinco Zn... Sono la spina dorsale dell\'industria. Il ferro arrugginisce cedendo elettroni all\'ossigeno — la ruggine è ferro che "brucia" lentamente.' },
  'metal-post': { label:'Metalli post-transizione', color:'#1a2d6e', story:'Alluminio Al, piombo Pb, stagno Sn. Meno robusti dei metalli di transizione. L\'alluminio sembra sempre lucido perché si ossida istantaneamente in superficie, formando uno strato protettivo invisibile.' },
  'metalloid':  { label:'Metalloidi (semimetalli)', color:'#27500A', story:'Il silicio Si è il protagonista assoluto dell\'elettronica — ogni chip è silicio purissimo. I metalloidi stanno a metà: conducono l\'elettricità ma solo in certe condizioni (semiconduttori).' },
  'nonmetal':   { label:'Non metalli',            color:'#3C3489', story:'Carbonio C, ossigeno O, azoto N, idrogeno H, fosforo P, zolfo S. Il carbonio è il mattone della vita: può formare catene lunghissime (la chimica organica è quasi tutta sua). L\'ossigeno ci fa respirare proprio perché "attira" gli elettroni in modo aggressivo.' },
  'halogen':    { label:'Alogeni',                color:'#72243E', story:'Fluoro F, cloro Cl, bromo Br, iodio I. Il nome significa "generatori di sale" — cloro + sodio = sale da cucina! Hanno 7 elettroni nell\'ultimo guscio e sono affamatissimi dell\'ottavo: reagiscono con tutto.' },
  'noble':      { label:'Gas nobili',             color:'#711B13', story:'Elio He, neon Ne, argon Ar, cripton Kr... "Nobili" perché non si mescolano con nessuno: hanno l\'ultimo guscio pieno (8 elettroni) e non hanno bisogno di niente. L\'elio dei palloncini non reagisce con l\'aria — per questo non esplode come l\'idrogeno!' },

const grid = document.getElementById('grid');
const ROWS = 9, COLS = 18;
const cells = {};
// Create 9 rows × 18 cols grid cells (blank)
for(let r=1;r<=ROWS;r++){
  for(let c=1;c<=COLS;c++){
    const div = document.createElement('div');
    div.className='el t-blank';
    div.style.minHeight='38px';
    grid.appendChild(div);
    cells[`${r}_${c}`]=div;
  }
}
// Place elements
elements.forEach(([z,sym,name,grp,col,row])=>{
  const d=cells[`${row}_${col}`];
  if(!d)return;
  d.className=`el t-${grp}`;
  d.innerHTML=`<span class="num">${z}</span><span class="sym">${sym}</span><span class="nam">${name}</span>`;
  d.title=name;
  d.onclick=()=>showInfo(z,sym,name,grp);
});
// La-Ac placeholders in rows 6 and 7
const laPlaceholder=cells['6_3'];
if(laPlaceholder){laPlaceholder.className='el t-lan-act';laPlaceholder.innerHTML='<span class="sym" style="font-size:9px">57–71</span><span class="nam">Lantanidi</span>';laPlaceholder.onclick=()=>showGroup('lan-act');}
const acPlaceholder=cells['7_3'];
if(acPlaceholder){acPlaceholder.className='el t-lan-act';acPlaceholder.innerHTML='<span class="sym" style="font-size:9px">89–103</span><span class="nam">Attinidi</span>';acPlaceholder.onclick=()=>showGroup('lan-act');}

// Row separator spacer between row 7 and 8
// (Grid handles it naturally since row 8 starts immediately)

function showInfo(z,sym,name,grp){
  const g=groups[grp]||{label:grp,color:'var(--color-text-primary)',story:''};
  const card=document.getElementById('card');
  card.innerHTML=`<h3 style="color:${g.color}">${z} — ${sym} &middot; ${name}</h3><p><strong style="color:var(--color-text-primary)">${g.label}.</strong> ${g.story}</p>`;
}
function showGroup(grp){
  const g=groups[grp]||{label:grp,color:'var(--color-text-primary)',story:''};
  document.getElementById('card').innerHTML=`<h3 style="color:${g.color}">${g.label}</h3><p>${g.story}</p>`;
}
</script>
